<!DOCTYPE html>
<html>
<head>

<title>Deepfake Detection System</title>

<style>

body{
font-family: Arial;
background:#eef2f7;
text-align:center;
}

.container{
background:white;
width:520px;
margin:auto;
margin-top:50px;
padding:30px;
border-radius:12px;
box-shadow:0 0 20px rgba(0,0,0,0.1);
}

h2{
margin-bottom:20px;
}

img{
width:300px;
margin-top:20px;
border-radius:10px;
}

button{
padding:12px 25px;
font-size:16px;
background:#007bff;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

.result-box{
margin-top:20px;
padding:15px;
border-radius:8px;
font-size:20px;
font-weight:bold;
}

.real{
background:#d4edda;
color:#155724;
}

.fake{
background:#f8d7da;
color:#721c24;
}

.confidence-bar{
margin-top:10px;
background:#ddd;
border-radius:6px;
overflow:hidden;
height:20px;
}

.confidence-fill{
height:100%;
background:#007bff;
text-align:center;
color:white;
font-size:12px;
}

</style>

</head>

<body>

<div class="container">

<h2>Deepfake Image Detection</h2>

<form method="POST" enctype="multipart/form-data">

<input type="file" name="image" required>

<br><br>

<button type="submit">Analyze Image</button>

</form>

{% if image_path %}
<img src="{{ image_path }}">
{% endif %}

{% if prediction %}

<div class="result-box {% if 'REAL' in prediction %}real{% else %}fake{% endif %}">
{{ prediction }}
</div>

<div style="margin-top:10px;">
Confidence: {{ confidence }} %
</div>

<div class="confidence-bar">
<div class="confidence-fill" style="width: {{ confidence }}%">
{{ confidence }}%
</div>
</div>

{% endif %}

</div>

</body>
</html>
